agent:
  action_type: discrete
  max_velocity: 1.0
  memory_length: 9
  n_discrete_actions: 8
curriculum:
  enabled: true
  phases:
  - end: 1000000
    sources:
    - S1
    start: 0
  - end: 2000000
    sources:
    - S1
    - S2
    start: 1000000
  - end: 3000000
    sources:
    - S1
    - S2
    - S3
    start: 2000000
data:
  concentration_var: Concentration - component 1
  fill_value: 0.0
  interpolation: linear
  nc_pattern: CMEMS_*_conc_grid_10m.nc
  time_var: time
  x_var: x
  y_var: y
domain:
  grid_resolution: 10
  nx: 300
  ny: 250
  xmax: 622000
  xmin: 619000
  ymax: 4797000
  ymin: 4794500
environment:
  dt: 10
  max_episode_steps: 1080
  normalize_obs: true
  normalize_reward: true
  reward:
    boundary_penalty: -10.0
    distance_reward_multiplier: 1.0
    distance_threshold: 100
    land_penalty: -200.0
    land_proximity_penalty_max: -5.0
    land_proximity_threshold: 10.0
    plume_reward_negative: -0.3
    plume_reward_positive: 0.3
    plume_threshold: 0.1
    source_reached_bonus: 100.0
    step_penalty: -0.1
  spawn:
    conc_threshold: 0.5
    max_distance: 1500
    min_distance: 200
    min_land_distance: 50
    start_frame: 1440
multi_agent:
  communication_range: 100
  coordination_bonus: 5.0
  enabled: false
  n_agents: 3
  shared_reward: false
sources:
  S1:
    x: 620100
    y: 4796210
  S2:
    x: 619800
    y: 4795900
  S3:
    x: 620200
    y: 4795800
  concentration: 1000
  flow_rate: 50
synthetic:
  enabled: true
  gaussian:
    advection_velocity:
    - 0.1
    - 0.05
    diffusion_coef: 5.0
    source_strength: 1000
  plume_model: gaussian
  time_varying: true
  wind_variability: 0.2
training:
  algorithm: PPO
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.05
  eval_freq: 10000
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 5.0e-05
  max_grad_norm: 0.5
  n_epochs: 10
  n_eval_episodes: 10
  n_steps: 4096
  policy: MlpPolicy
  policy_kwargs:
    activation_fn: tanh
    net_arch:
      pi:
      - 256
      - 256
      vf:
      - 256
      - 256
  save_freq: 50000
  tensorboard_log: ./logs/tensorboard
  total_timesteps: 3000000
  verbose: 1
  vf_coef: 0.3
