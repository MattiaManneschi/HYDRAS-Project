agent:
  action_type: discrete
  max_velocity: 1.0
  memory_length: 9
  n_discrete_actions: 8
curriculum:
  enabled: false
  phases:
  - description: 'Fine-tuning: 106 sources x 4 scenarios = 424 files (1.5M steps)'
    end: 1500000
    num_sources: 106
    start: 0
data:
  concentration_var: Concentration - component 1
  fill_value: 0.0
  interpolation: linear
  nc_pattern: CMEMS_*_conc_grid_10m.nc
  time_var: time
  x_var: x
  y_var: y
domain:
  grid_resolution: 10
  nx: 300
  ny: 250
  xmax: 622000
  xmin: 619000
  ymax: 4797000
  ymin: 4794500
environment:
  dt: 10
  max_episode_steps: 1080
  normalize_obs: true
  normalize_reward: false
  reward:
    boundary_penalty: -10.0
    concentration_gradient_reward_negative: -0.05
    concentration_gradient_reward_positive: 0.05
    current_alignment_penalty: -0.05
    current_alignment_reward: 0.05
    distance_reward_multiplier: 1.0
    distance_threshold: 50
    land_proximity_penalty_max: -5.0
    land_proximity_threshold: 10.0
    outside_plume_distance_reward_scale: 0.7
    plume_exit_penalty: -0.5
    plume_reentry_reward: 0.4
    plume_reward_negative: -0.5
    plume_reward_positive: 0.5
    plume_stay_reward: 0.75
    plume_threshold: 0.1
    source_reached_bonus: 100.0
    stagnation_distance_threshold: 20.0
    stagnation_penalty: -1.5
    stagnation_window: 50
    step_penalty: -0.1
    wind_alignment_penalty: -0.05
    wind_alignment_reward: 0.05
  spawn:
    conc_threshold: 0.5
    min_land_distance: 50
    start_frame: 352
sources:
  concentration: 1000
  flow_rate: 50
training:
  algorithm: PPO
  batch_size: 128
  chunk_ids:
  - 0
  - 1
  - 2
  clip_range: 0.15
  ent_coef: 0.01
  eval_freq: 50000
  eval_scenarios:
  - chunk_id: 2
    source: SRC050
    version: V2
  - chunk_id: 1
    source: SRC050
    version: V1
  - chunk_id: 0
    source: SRC001
    version: V0
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 2.0e-05
  max_grad_norm: 0.4
  n_epochs: 5
  n_eval_episodes: 5
  n_steps: 4096
  policy: MlpPolicy
  policy_kwargs:
    activation_fn: tanh
    net_arch:
      pi:
      - 256
      - 256
      vf:
      - 256
      - 256
  progress_bar: true
  resume_from: trained_models/ppo_20260414_165629/models/final_model.zip
  save_freq: 50000
  target_kl: 0.01
  tensorboard_log: ./logs/tensorboard
  total_timesteps: 1500000
  verbose: 1
  vf_coef: 0.3
