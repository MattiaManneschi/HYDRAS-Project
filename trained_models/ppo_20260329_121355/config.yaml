agent:
  action_type: discrete
  max_velocity: 1.0
  memory_length: 9
  n_discrete_actions: 8
curriculum:
  enabled: true
  phases:
  - description: 'Phase 1: Initial 26 sources'
    end: 1000000
    num_sources: 26
    start: 0
  - description: 'Phase 2: Extended to 52 sources'
    end: 2000000
    num_sources: 52
    start: 1000000
  - description: 'Phase 3: Full 80 sources'
    end: 3000000
    num_sources: 80
    start: 2000000
data:
  concentration_var: Concentration - component 1
  fill_value: 0.0
  interpolation: linear
  nc_pattern: CMEMS_*_conc_grid_10m.nc
  time_var: time
  x_var: x
  y_var: y
domain:
  grid_resolution: 10
  nx: 300
  ny: 250
  xmax: 622000
  xmin: 619000
  ymax: 4797000
  ymin: 4794500
environment:
  dt: 10
  max_episode_steps: 300
  normalize_obs: true
  normalize_reward: true
  reward:
    boundary_penalty: -10.0
    concentration_gradient_reward_negative: -0.05
    concentration_gradient_reward_positive: 0.05
    distance_reward_multiplier: 1.0
    distance_threshold: 50
    land_proximity_penalty_max: -5.0
    land_proximity_threshold: 10.0
    plume_reward_negative: -1.0
    plume_reward_positive: 1.0
    plume_threshold: 0.1
    source_reached_bonus: 100.0
    step_penalty: -0.1
    wind_alignment_penalty: -0.05
    wind_alignment_reward: 0.05
  spawn:
    conc_threshold: 0.5
    max_distance: 1500
    min_distance: 500
    min_land_distance: 50
    start_frame: 352
sources:
  concentration: 1000
  flow_rate: 50
synthetic:
  enabled: true
  gaussian:
    advection_velocity:
    - 0.1
    - 0.05
    diffusion_coef: 5.0
    source_strength: 1000
  plume_model: gaussian
  time_varying: true
  wind_variability: 0.2
training:
  algorithm: PPO
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.05
  eval_freq: 10000
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 5.0e-05
  max_grad_norm: 0.5
  n_epochs: 10
  n_eval_episodes: 10
  n_steps: 4096
  policy: MlpPolicy
  policy_kwargs:
    activation_fn: tanh
    net_arch:
      pi:
      - 256
      - 256
      vf:
      - 256
      - 256
  save_freq: 50000
  tensorboard_log: ./logs/tensorboard
  total_timesteps: 3000000
  verbose: 1
  vf_coef: 0.3
