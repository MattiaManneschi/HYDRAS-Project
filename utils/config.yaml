# HYDRAS Source Seeking - Configuration
# Basato sulle specifiche del report DICEA per le simulazioni nel porto di Cecina

# Domain configuration (from report)
domain:
  # Coordinate box di estrazione (UTM 32)
  xmin: 619000  # m
  xmax: 622000  # m
  ymin: 4794500  # m
  ymax: 4797000  # m
  
  # Grid resolution
  grid_resolution: 10  # m (come da report)
  
  # Derived dimensions
  nx: 300  # (622000 - 619000) / 10
  ny: 250  # (4797000 - 4794500) / 10

# Emission parameters
sources:
  flow_rate: 50  # l/s
  concentration: 1000  # g/m³
  
# Agent configuration
agent:
  # Action space
  max_velocity: 1.0  # m/s - velocità dell'AUV
  action_type: "discrete"  # 4 direzioni cardinali (N/S/E/W)
  n_discrete_actions: 8  # N, S, E, W, NE, SE, NW, SW

  # Memory - ultimi N step (concentrazioni + spostamenti + sensori terra)
  memory_length: 9  # 9 step passati -> obs: 1 + 9 + 18 + 4 = 32 valori

# Environment configuration
environment:
  # Time settings
  dt: 10  # s - timestep della simulazione
  max_episode_steps: 1080  # passi massimi per episodio (3 ore: 10800s / 10s = 1080 steps)

  # Reward shaping
  reward:
    source_reached_bonus: 100.0
    step_penalty: -0.1
    boundary_penalty: -10.0
    land_proximity_threshold: 30.0  # m - distanza dalla terra per penalità progressiva (estesa)
    land_proximity_penalty_max: -15.0  # penalità massima per vicinanza terra (aumentata 3×)
    distance_threshold: 50  # m - distanza dalla sorgente per "trovato"
    distance_reward_multiplier: 100.0  # scala per potenziale quadratico (Φ(d)=(max_d-d)²)
    retreat_penalty_multiplier: 3.0  # allontanarsi costa 3× di più che avvicinarsi (stessa zona)
    concentration_gradient_reward_positive: 0.05
    concentration_gradient_reward_negative: -0.05
    wind_alignment_reward: 0.05  # reward if moving upwind (against wind)
    wind_alignment_penalty: -0.05  # penalty if moving downwind (with wind)
    current_alignment_reward: 0.05  # reward if moving against current (upstream)
    current_alignment_penalty: -0.05  # penalty if moving with current (downstream)
    stagnation_window: 15  # steps senza miglioramento distanza -> penalità
    stagnation_distance_threshold: 20.0  # m - miglioramento minimo per evitare penalità
    stagnation_penalty: -1.5  # penalità se distanza stagna
    directional_stagnation_threshold: 0.15  # efficienza < soglia → oscillazione direzionale
    directional_stagnation_penalty: -0.5    # penalità per oscillazione direzionale (dimezzata per ridurre shock)

  # Spawn constraints
  spawn:
    min_land_distance: 50  # m - distanza minima dalla terra per spawn
    start_frame: 352  # frame di partenza (25% della simulazione, Chunk 0) - sovrascitto da chunk_id
    conc_threshold: 0.5  # soglia minima concentrazione

  # Normalization
  normalize_obs: true
  normalize_reward: false

# Training configuration (PPO)
training:
  # Algorithm
  algorithm: "PPO"

  # Hyperparameters
  learning_rate: 0.00001  # Fine-tuning: LR ulteriormente ridotto per reward scale più alta (1/d uncapped)
  n_steps: 4096  # Aumentato per avere ~4 episodi completi per batch
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.15
  ent_coef: 0.01  # Ridotto per limitare oscillazioni tardive
  vf_coef: 0.3
  max_grad_norm: 0.4
  target_kl: 0.01  # Early stop update PPO se policy shift troppo aggressivo

  # Network architecture
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    activation_fn: "tanh"

  # Training loop
  total_timesteps: 2000000  # Fine-tuning: 2M timesteps per adattamento più graduale
  eval_freq: 50000
  n_eval_episodes: 5
  chunk_ids: [0, 1, 2]  # Chunk usati in training: 0=Q1/4, 1=Q1/2, 2=Q3/4

  # Fine-tuning targetizzato: 80% degli env su V2 (plume complessi), 20% mixed anti-forgetting
  targeted_versions: ["V2"]       # versioni target (problematiche con bypass)
  targeted_chunk_ids: [1, 2]      # Q1/2 e Q3/4 per V2 (plume maturo e tardivo)
  n_targeted_per_chunk: 2         # env V2 per chunk → 2×2=4 targeted + 1 mixed = 80/20
  resume_from: "trained_models/ppo_20260429_105639/models/final_model.zip"  # modello 93.6% - bypass del secondo finetuning (regressione)
  eval_scenarios:
    - source: "SRC050"
      version: "V2"
      chunk_id: 2    # Q3/4 - V2 caso difficile
    - source: "SRC107"
      version: "V2"
      chunk_id: 2    # Q3/4 - V2 caso osservato con oscillazione costiera
    - source: "SRC050"
      version: "V1"
      chunk_id: 1    # Q1/2 - baseline V1
    - source: "SRC001"
      version: "V0"
      chunk_id: 0    # Q1/4 - baseline V0
  save_freq: 50000
  progress_bar: true  # Mostra barra di avanzamento training

  # Logging
  tensorboard_log: "./logs/tensorboard"
  verbose: 1

# Curriculum learning - disabilitato per fine-tuning (modello già maturo, full dataset da step 0)
curriculum:
  enabled: false
  phases:
    - start: 0
      end: 1500000
      num_sources: 106  # SRC001-SRC106 -> 106 sorgenti x 4 scenari vento = 424 file
      description: "Fine-tuning: 106 sources x 4 scenarios = 424 files (1.5M steps)"

# Data configuration
data:
  # NetCDF file pattern
  nc_pattern: "CMEMS_*_conc_grid_10m.nc"

  # Variables to load (from MIKE21 output)
  concentration_var: "Concentration - component 1"  # nome esatto nel NC
  time_var: "time"
  x_var: "x"
  y_var: "y"

  # Grid info (from NC inspection)
  # time: 2821 steps (~47 ore con dt=1min)
  # y: 251 cells
  # x: 301 cells

  # Preprocessing
  interpolation: "linear"
  fill_value: 0.0
