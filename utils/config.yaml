# HYDRAS Source Seeking - Configuration
# Basato sulle specifiche del report DICEA per le simulazioni nel porto di Cecina

# Domain configuration (from report)
domain:
  # Coordinate box di estrazione (UTM 32)
  xmin: 619000  # m
  xmax: 622000  # m
  ymin: 4794500  # m
  ymax: 4797000  # m
  
  # Grid resolution
  grid_resolution: 10  # m (come da report)
  
  # Derived dimensions
  nx: 300  # (622000 - 619000) / 10
  ny: 250  # (4797000 - 4794500) / 10

# Emission parameters
sources:
  flow_rate: 50  # l/s
  concentration: 1000  # g/m³
  
# Agent configuration
agent:
  # Action space
  max_velocity: 1.0  # m/s - velocità dell'AUV
  action_type: "discrete"  # 4 direzioni cardinali (N/S/E/W)
  n_discrete_actions: 8  # N, S, E, W, NE, SE, NW, SW

  # Memory - ultimi N step (concentrazioni + spostamenti + sensori terra)
  memory_length: 9  # 9 step passati -> obs: 1 + 9 + 18 + 4 = 32 valori

# Environment configuration
environment:
  # Time settings
  dt: 10  # s - timestep della simulazione
  max_episode_steps: 1080  # passi massimi per episodio (3 ore: 10800s / 10s = 1080 steps)

  # Reward shaping
  reward:
    source_reached_bonus: 100.0
    step_penalty: -0.1
    boundary_penalty: -10.0
    land_proximity_threshold: 10.0  # m - distanza dalla terra per penalità progressiva
    land_proximity_penalty_max: -5.0  # penalità massima per vicinanza terra (aumentata)
    distance_threshold: 50  # m - distanza dalla sorgente per "trovato"
    distance_reward_multiplier: 1.0  # moltiplicatore per reward distanza
    plume_reward_positive: 1.5  # reward binario dentro il plume (PRIORITARIO)
    plume_reward_negative: -1.5  # penalità fuori dal plume (PRIORITARIO)
    plume_stay_reward: 0.75  # bonus se resta nel plume da uno step al successivo
    plume_reentry_reward: 0.4  # bonus se rientra nel plume
    plume_exit_penalty: -2.0  # penalità se esce dal plume
    outside_plume_distance_reward_scale: 0.35  # attenua reward distanza positivo quando fuori plume
    plume_threshold: 0.1  # soglia concentrazione per "dentro il plume"
    concentration_gradient_reward_positive: 0.05
    concentration_gradient_reward_negative: -0.05
    wind_alignment_reward: 0.05  # reward if moving upwind (against wind)
    wind_alignment_penalty: -0.05  # penalty if moving downwind (with wind)

  # Spawn constraints
  spawn:
    min_distance: 500      # m - distanza minima dalla sorgente
    max_distance: 1500  # m - distanza massima dalla sorgente
    min_land_distance: 50  # m - distanza minima dalla terra per spawn
    start_frame: 352  # frame di partenza (25% della simulazione, Chunk 0) - sovrascitto da chunk_id
    conc_threshold: 0.5  # soglia minima concentrazione

  # Normalization
  normalize_obs: true
  normalize_reward: true  # Attivato per ridurre varianza reward

# Training configuration (PPO)
training:
  # Algorithm
  algorithm: "PPO"

  # Hyperparameters
  learning_rate: 0.00002  # Fine-tuning: LR ridotto per stabilizzare su 106 sorgenti
  n_steps: 4096  # Aumentato per avere ~4 episodi completi per batch
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.15
  ent_coef: 0.01  # Ridotto per limitare oscillazioni tardive
  vf_coef: 0.3
  max_grad_norm: 0.4
  target_kl: 0.01  # Early stop update PPO se policy shift troppo aggressivo

  # Network architecture
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    activation_fn: "tanh"

  # Training loop
  total_timesteps: 1500000  # Fine-tuning: 1.5M timesteps aggiuntivi
  eval_freq: 10000
  n_eval_episodes: 35
  chunk_ids: [0, 2]  # Chunk usati in training: 0=Q1/4, 2=Q3/4
  eval_chunk_id: 0  # Chunk usato in eval fisso
  resume_from: "trained_models/ppo_20260407_091232/models/best/best_model.zip"  # Baseline stabile (~90% SR) per fine-tuning
  eval_source_id: "SRC001"  # scenario fisso per EvalCallback (sorgente)
  eval_version: "V1"  # scenario fisso per EvalCallback (versione vento/corrente)
  save_freq: 50000
  progress_bar: true  # Mostra barra di avanzamento training

  # Logging
  tensorboard_log: "./logs/tensorboard"
  verbose: 1

# Curriculum learning - Fine-tuning su full training set (106 sorgenti x 4 scenari)
curriculum:
  enabled: true
  phases:
    - start: 0
      end: 1500000
      num_sources: 106  # SRC001-SRC106 -> 106 sorgenti x 4 scenari vento = 424 file
      description: "Fine-tuning: 106 sources x 4 scenarios = 424 files (1.5M steps)"

# Data configuration
data:
  # NetCDF file pattern
  nc_pattern: "CMEMS_*_conc_grid_10m.nc"

  # Variables to load (from MIKE21 output)
  concentration_var: "Concentration - component 1"  # nome esatto nel NC
  time_var: "time"
  x_var: "x"
  y_var: "y"

  # Grid info (from NC inspection)
  # time: 2821 steps (~47 ore con dt=1min)
  # y: 251 cells
  # x: 301 cells

  # Preprocessing
  interpolation: "linear"
  fill_value: 0.0
