# HYDRAS Source Seeking - Configuration
# Basato sulle specifiche del report DICEA per le simulazioni nel porto di Cecina

# Domain configuration (from report)
domain:
  # Coordinate box di estrazione (UTM 32)
  xmin: 619000  # m
  xmax: 622000  # m
  ymin: 4794500  # m
  ymax: 4797000  # m
  
  # Grid resolution
  grid_resolution: 10  # m (come da report)
  
  # Derived dimensions
  nx: 300  # (622000 - 619000) / 10
  ny: 250  # (4797000 - 4794500) / 10

# Source configuration (from report)
sources:
  S1:
    x: 620100  # m UTM
    y: 4796210  # m UTM
  S2:
    x: 619800
    y: 4795900
  S3:
    x: 620200
    y: 4795800
  
  # Emission parameters
  flow_rate: 50  # l/s
  concentration: 1000  # g/m³

# Agent configuration
agent:
  # Action space
  max_velocity: 1.0  # m/s - velocità dell'AUV
  action_type: "discrete"  # 4 direzioni cardinali (N/S/E/W)
  n_discrete_actions: 8  # N, S, E, W, NE, SE, NW, SW

  # Memory - ultimi N step (concentrazioni + spostamenti + sensori terra)
  memory_length: 9  # 9 step passati -> obs: 1 + 9 + 18 + 4 = 32 valori

# Environment configuration
environment:
  # Time settings
  dt: 10  # s - timestep della simulazione
  max_episode_steps: 1080  # passi massimi per episodio (3 ore: 10800s / 10s = 1080 steps)

  # Reward shaping
  reward:
    source_reached_bonus: 100.0
    step_penalty: -0.1
    boundary_penalty: -10.0
    land_proximity_threshold: 10.0  # m - distanza dalla terra per penalità progressiva
    land_proximity_penalty_max: -5.0  # penalità massima per vicinanza terra (aumentata)
    distance_threshold: 100  # m - distanza dalla sorgente per "trovato"
    distance_reward_multiplier: 1.0  # moltiplicatore per reward distanza
    plume_reward_positive: 0.3  # reward binario dentro il plume
    plume_reward_negative: -0.3  # penalità fuori dal plume
    plume_threshold: 0.1  # soglia concentrazione per "dentro il plume"

  # Spawn constraints
  spawn:
    min_distance: 200  # m - distanza minima dalla sorgente
    max_distance: 1500  # m - distanza massima dalla sorgente
    min_land_distance: 50  # m - distanza minima dalla terra per spawn
    start_frame: 1440  # frame di partenza (metà simulazione)
    conc_threshold: 0.5  # soglia minima concentrazione

  # Normalization
  normalize_obs: true
  normalize_reward: true  # Attivato per ridurre varianza reward

# Training configuration (PPO)
training:
  # Algorithm
  algorithm: "PPO"

  # Hyperparameters
  learning_rate: 0.00005  # Ridotto a 5e-5 per reward ad alta varianza
  n_steps: 4096  # Aumentato per avere ~4 episodi completi per batch
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05  # AUMENTATO: più esplorazione casuale
  vf_coef: 0.3
  max_grad_norm: 0.5

  # Network architecture
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    activation_fn: "tanh"

  # Training loop
  total_timesteps: 3000000  # 3M totale (1M per sorgente)
  eval_freq: 10000
  n_eval_episodes: 10
  save_freq: 50000

  # Logging
  tensorboard_log: "./logs/tensorboard"
  verbose: 1

# Curriculum learning
curriculum:
  enabled: true
  phases:
    - start: 0
      end: 1000000
      sources: ["S1"]
    - start: 1000000
      end: 2000000
      sources: ["S1", "S2"]
    - start: 2000000
      end: 3000000
      sources: ["S1", "S2", "S3"]

# Data configuration
data:
  # NetCDF file pattern
  nc_pattern: "CMEMS_*_conc_grid_10m.nc"

  # Variables to load (from MIKE21 output)
  concentration_var: "Concentration - component 1"  # nome esatto nel NC
  time_var: "time"
  x_var: "x"
  y_var: "y"

  # Grid info (from NC inspection)
  # time: 2821 steps (~47 ore con dt=1min)
  # y: 251 cells
  # x: 301 cells

  # Preprocessing
  interpolation: "linear"
  fill_value: 0.0

# Synthetic data (for testing without NC files)
synthetic:
  enabled: true  # usa dati sintetici se NC non disponibile
  plume_model: "gaussian"  # "gaussian", "advection_diffusion"

  # Gaussian plume parameters
  gaussian:
    diffusion_coef: 5.0  # m²/s
    advection_velocity: [0.1, 0.05]  # m/s [u, v]
    source_strength: 1000  # g/m³

  # Time-varying parameters
  time_varying: true
  wind_variability: 0.2  # coefficiente di variabilità

# Multi-agent configuration (for future extension)
multi_agent:
  enabled: false
  n_agents: 3
  communication_range: 100  # m
  shared_reward: false
  coordination_bonus: 5.0