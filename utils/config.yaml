# HYDRAS Source Seeking - Configuration
# Basato sulle specifiche del report DICEA per le simulazioni nel porto di Cecina

# Domain configuration (from report)
domain:
  # Coordinate box di estrazione (UTM 32)
  xmin: 619000  # m
  xmax: 622000  # m
  ymin: 4794500  # m
  ymax: 4797000  # m
  
  # Grid resolution
  grid_resolution: 10  # m (come da report)
  
  # Derived dimensions
  nx: 300  # (622000 - 619000) / 10
  ny: 250  # (4797000 - 4794500) / 10

# Emission parameters
sources:
  flow_rate: 50  # l/s
  concentration: 1000  # g/m³
  
# Agent configuration
agent:
  # Action space
  max_velocity: 1.0  # m/s - velocità dell'AUV
  action_type: "discrete"  # 4 direzioni cardinali (N/S/E/W)
  n_discrete_actions: 8  # N, S, E, W, NE, SE, NW, SW

  # Memory - ultimi N step (concentrazioni + spostamenti + sensori terra)
  memory_length: 9  # 9 step passati -> obs: 1 + 9 + 18 + 4 = 32 valori

# Environment configuration
environment:
  # Time settings
  dt: 10  # s - timestep della simulazione
  max_episode_steps: 300  # passi massimi per episodio (~50 min: 3000s / 10s = 300 steps) - adatto ai 1411 timesteps disponibili

  # Reward shaping
  reward:
    source_reached_bonus: 100.0
    step_penalty: -0.05  # Ridotto da -0.1 per incoraggiare esplorazione
    boundary_penalty: -10.0
    land_proximity_threshold: 10.0  # m - distanza dalla terra per penalità progressiva
    land_proximity_penalty_max: -5.0  # penalità massima per vicinanza terra (aumentata)
    distance_threshold: 50  # m - distanza dalla sorgente per "trovato"
    distance_reward_multiplier: 1.5  # Moltiplicatore per reward distanza (prioritario ma non dominante)
    plume_reward_positive: 1.0  # reward binario dentro il plume (PRIORITARIO)
    plume_reward_negative: -1.0  # penalità fuori dal plume (PRIORITARIO)
    plume_threshold: 0.05  # Compromesso tra plume disperso Q3/4 e rumore
    concentration_gradient_reward_positive: 0.05
    concentration_gradient_reward_negative: -0.05
    wind_alignment_reward: 0.05  # RIMOSSO da reward function - vento già in input NN
    wind_alignment_penalty: -0.05  # RIMOSSO da reward function - vento già in input NN

  # Spawn constraints
  spawn:
    min_distance: 500      # m - distanza minima dalla sorgente
    max_distance: 1500  # m - distanza massima dalla sorgente
    min_land_distance: 50  # m - distanza minima dalla terra per spawn
    start_frame: 352  # frame di partenza (25% della simulazione, Chunk 0) - sovrascitto da chunk_id
    conc_threshold: 0.1  # soglia minima concentrazione (ridotta da 0.5 per coprire più area del plume)

  # Normalization
  normalize_obs: true
  normalize_reward: true  # Attivato per ridurre varianza reward

# Training configuration (PPO)
training:
  # Algorithm
  algorithm: "PPO"

  # Hyperparameters
  learning_rate: 0.00005  # Ridotto a 5e-5 per reward ad alta varianza
  n_steps: 4096  # Aumentato per avere ~4 episodi completi per batch
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.1  # Aumentato da 0.05: exploration moderato per adattarsi a direzioni diverse Q1/4 vs Q3/4
  vf_coef: 0.3
  max_grad_norm: 0.5

  # Network architecture
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    activation_fn: "tanh"

  # Training loop
  total_timesteps: 6000000  # 6M totale su V0+V1+V2+V3 (80% training set)
  eval_freq: 10000
  n_eval_episodes: 10
  save_freq: 50000

  # Logging
  tensorboard_log: "./logs/tensorboard"
  verbose: 1

# Curriculum learning - Progressive training on increasing source sets (V0+V1+V2+V3)
curriculum:
  enabled: true
  phases:
    - start: 0
      end: 1200000
      num_sources: 35  # SRC001-SRC035 (first 1/3 of 106 training sources × V0+V1+V2+V3)
      description: "Phase 1: Initial 35 sources with all 4 versions (1.2M steps)"
    - start: 1200000
      end: 2800000
      num_sources: 70  # SRC001-SRC070 (first 2/3 of 106 training sources × V0+V1+V2+V3)
      description: "Phase 2: Extended to 70 sources with all 4 versions (1.6M steps)"
    - start: 2800000
      end: 4000000
      num_sources: 106  # SRC001-SRC106 (full 80% training set × V0+V1+V2+V3)
      description: "Phase 3: Full 106 training sources with all 4 versions (1.2M steps)"

# Data configuration
data:
  # NetCDF file pattern
  nc_pattern: "CMEMS_*_conc_grid_10m.nc"

  # Variables to load (from MIKE21 output)
  concentration_var: "Concentration - component 1"  # nome esatto nel NC
  time_var: "time"
  x_var: "x"
  y_var: "y"

  # Grid info (from NC inspection)
  # time: 2821 steps (~47 ore con dt=1min)
  # y: 251 cells
  # x: 301 cells

  # Preprocessing
  interpolation: "linear"
  fill_value: 0.0

# Synthetic data (for testing without NC files)
synthetic:
  enabled: true  # usa dati sintetici se NC non disponibile
  plume_model: "gaussian"  # "gaussian", "advection_diffusion"

  # Gaussian plume parameters
  gaussian:
    diffusion_coef: 5.0  # m²/s
    advection_velocity: [0.1, 0.05]  # m/s [u, v]
    source_strength: 1000  # g/m³

  # Time-varying parameters
  time_varying: true
  wind_variability: 0.2  # coefficiente di variabilità